services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend1
      - backend2
      - backend3

  backend1:
    build:
      context: ./app
    environment:
      - INSTANCE_NAME=backend-1
      - JWT_SECRET=dev-secret-change-me
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
      - DB_PATH=/data/app.db
    volumes:
      - shared_data:/data
    ports:
      - "8081:8000"

  backend2:
    build:
      context: ./app
    environment:
      - INSTANCE_NAME=backend-2
      - JWT_SECRET=dev-secret-change-me
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
      - DB_PATH=/data/app.db
    volumes:
      - shared_data:/data
    ports:
      - "8082:8000"

  backend3:
    build:
      context: ./app
    environment:
      - INSTANCE_NAME=backend-3
      - JWT_SECRET=dev-secret-change-me
      - ADMIN_USER=admin
      - ADMIN_PASSWORD=admin
      - DB_PATH=/data/app.db
    volumes:
      - shared_data:/data
    ports:
      - "8083:8000"

volumes:
  shared_data:

