worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  access_log  /var/log/nginx/access.log;
  error_log   /var/log/nginx/error.log warn;
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream backend_pool {
    # Round-robin por defecto
    zone backend_pool 64k;
    server backend1:8000 resolve max_fails=0;
    server backend2:8000 resolve max_fails=0;
    server backend3:8000 resolve max_fails=0;
  }

  server {
    listen 80;

    # Frontend estático
    root /usr/share/nginx/html;
    index index.html;

    location = / {
      add_header Cache-Control "no-store" always;
      try_files /index.html =404;
    }

    location /assets/ {
      try_files $uri =404;
    }

    # Evitar 404 en requests automáticos del navegador (no afectan la app)
    location = /favicon.ico { return 204; }
    location ^~ /.well-known/appspecific/ { return 204; }

    # API (proxy al pool de backends)
    location /api/ {
      add_header X-Upstream $upstream_addr always;
      add_header X-Upstream-Status $upstream_status always;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      proxy_pass http://backend_pool;
    }

    # Proxy directo por backend (para seleccionar 1/2/3 en el frontend)
    location /backend1/ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://backend1:8000/;
    }
    location /backend2/ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://backend2:8000/;
    }
    location /backend3/ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://backend3:8000/;
    }

    # Compatibilidad: si llamas /health o /hello sin /api (viejas pruebas)
    location ~ ^/(health|hello|login|items)(/.*)?$ {
      add_header X-Upstream $upstream_addr always;
      add_header X-Upstream-Status $upstream_status always;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_pass http://backend_pool;
    }
  }
}

